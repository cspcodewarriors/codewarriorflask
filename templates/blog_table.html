{% extends "layouts/base.html" %}

{% block body %}

<div class="container mt-5">
    <h1>Blog Post Management</h1>

    <div class="mb-3">
        <button class="btn btn-success" id="new-post-btn">New Post</button>
    </div>

    <table class="table table-striped" id="blogTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Event Date</th>
                <th>Program Tag</th>
                <th>Published</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="blog-tbody">
        </tbody>
    </table>
</div>

<!-- Edit/Create Modal -->
<div class="modal fade" id="postModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="postModalLabel">Blog Post</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="post-id">
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-control" id="post-title">
                </div>
                <div class="mb-3">
                    <label class="form-label">Event Date</label>
                    <input type="date" class="form-control" id="post-event-date">
                </div>
                <div class="mb-3">
                    <label class="form-label">Program Tag</label>
                    <input type="text" class="form-control" id="post-program-tag">
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" id="post-description" rows="5"></textarea>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="post-published">
                    <label class="form-check-label">Published</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="save-post-btn">Save</button>
            </div>
        </div>
    </div>
</div>

<script>
    $(document).ready(function () {
        const table = $("#blogTable").DataTable({
            columns: [
                { data: 'id' },
                { data: 'title' },
                { data: 'author' },
                { data: 'event_date' },
                { data: 'program_tag', defaultContent: '' },
                { data: 'published', render: val => val
                    ? '<span class="badge bg-success">Yes</span>'
                    : '<span class="badge bg-secondary">No</span>' },
                { data: 'created_at' },
                { data: null, orderable: false, render: (data, type, row) => `
                    <button class="btn btn-sm btn-primary edit-btn" data-id="${row.id}">Edit</button>
                    <button class="btn btn-sm btn-warning publish-btn" data-id="${row.id}" data-published="${row.published}">
                        ${row.published ? 'Unpublish' : 'Publish'}
                    </button>
                    <button class="btn btn-sm btn-danger delete-btn" data-id="${row.id}">Delete</button>
                ` }
            ]
        });

        function loadPosts() {
            fetch('/api/blog')
                .then(r => r.json())
                .then(posts => {
                    table.clear();
                    table.rows.add(posts);
                    table.draw();
                    bindButtons();
                })
                .catch(err => console.error('Error loading posts:', err));
        }

        function bindButtons() {
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    const id = this.dataset.id;
                    fetch(`/api/blog/post?id=${id}`)
                        .then(r => r.json())
                        .then(post => {
                            document.getElementById('post-id').value = post.id;
                            document.getElementById('post-title').value = post.title;
                            document.getElementById('post-event-date').value = post.event_date;
                            document.getElementById('post-program-tag').value = post.program_tag || '';
                            document.getElementById('post-description').value = post.description;
                            document.getElementById('post-published').checked = post.published;
                            document.getElementById('postModalLabel').textContent = 'Edit Post';
                            new bootstrap.Modal(document.getElementById('postModal')).show();
                        });
                });
            });

            document.querySelectorAll('.publish-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    const id = this.dataset.id;
                    const published = this.dataset.published === 'true';
                    fetch('/api/blog/publish', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: parseInt(id), published: !published })
                    })
                        .then(r => r.json())
                        .then(() => loadPosts())
                        .catch(err => alert('Error toggling publish status.'));
                });
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    if (!confirm('Delete this post?')) return;
                    const id = this.dataset.id;
                    fetch('/api/blog', {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: parseInt(id) })
                    })
                        .then(r => r.json())
                        .then(() => loadPosts())
                        .catch(err => alert('Error deleting post.'));
                });
            });
        }

        document.getElementById('new-post-btn').addEventListener('click', function () {
            document.getElementById('post-id').value = '';
            document.getElementById('post-title').value = '';
            document.getElementById('post-event-date').value = '';
            document.getElementById('post-program-tag').value = '';
            document.getElementById('post-description').value = '';
            document.getElementById('post-published').checked = false;
            document.getElementById('postModalLabel').textContent = 'New Post';
            new bootstrap.Modal(document.getElementById('postModal')).show();
        });

        document.getElementById('save-post-btn').addEventListener('click', function () {
            const id = document.getElementById('post-id').value;
            const body = {
                title: document.getElementById('post-title').value,
                event_date: document.getElementById('post-event-date').value,
                program_tag: document.getElementById('post-program-tag').value || null,
                description: document.getElementById('post-description').value,
                published: document.getElementById('post-published').checked
            };

            const isEdit = !!id;
            if (isEdit) body.id = parseInt(id);

            fetch('/api/blog', {
                method: isEdit ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            })
                .then(r => r.json())
                .then(data => {
                    if (data.message) { alert(data.message); return; }
                    bootstrap.Modal.getInstance(document.getElementById('postModal')).hide();
                    loadPosts();
                })
                .catch(err => alert('Error saving post.'));
        });

        loadPosts();
    });
</script>

{% endblock %}

{% block background %}
{% endblock %}
